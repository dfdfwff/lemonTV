name: Auto Sync IPTV with Email

on:
  # 每15分钟检查一次（比2小时更频繁）
  schedule:
    - cron: '*/15 * * * *'
  # 支持手动立即触发
  workflow_dispatch:

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    # 步骤1：检出你的仓库
    - name: Checkout your repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
    
    # 步骤2：检查当前文件哈希
    - name: Check current file hash
      id: hash_check
      run: |
        if [ -f "iptv-fe.m3u" ]; then
          OLD_HASH=$(sha256sum iptv-fe.m3u | awk '{print $1}')
          echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT
          echo "当前文件哈希: $OLD_HASH"
        else
          echo "old_hash=none" >> $GITHUB_OUTPUT
          echo "文件不存在，将创建新文件"
        fi
    
    # 步骤3：下载最新源文件
    - name: Download latest file
      id: download
      run: |
        # 下载源文件
        curl -s -L -o new-iptv.m3u "https://github.com/ioptu/IPTV.txt2m3u.player/raw/refs/heads/main/migu.m3u"
        
        # 计算新文件哈希
        NEW_HASH=$(sha256sum new-iptv.m3u | awk '{print $1}')
        echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT
        
        # 获取文件信息
        FILESIZE=$(stat -f%z new-iptv.m3u 2>/dev/null || stat -c%s new-iptv.m3u)
        LINES=$(wc -l < new-iptv.m3u)
        echo "新文件大小: ${FILESIZE}字节, ${LINES}行"
    
    # 步骤4：比较并决定是否更新
    - name: Compare files
      id: compare
      run: |
        if [ "${{ steps.hash_check.outputs.old_hash }}" == "${{ steps.download.outputs.new_hash }}" ]; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "文件未变化，跳过更新"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "文件已变化，将进行更新"
        fi
    
    # 步骤5：更新文件并推送
    - name: Update and push
      if: steps.compare.outputs.changed == 'true'
      run: |
        # 替换文件
        mv new-iptv.m3u iptv-fe.m3u
        
        # 配置Git
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # 提交更改
        git add iptv-fe.m3u
        git commit -m "🔄 自动同步IPTV: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
        
        源文件: https://github.com/ioptu/IPTV.txt2m3u.player
        新哈希: ${{ steps.download.outputs.new_hash }}
        旧哈希: ${{ steps.hash_check.outputs.old_hash }}"
        
        # 推送更改
        git push origin main
        
        echo "✅ 文件更新成功，已推送至仓库"
    
    # 步骤6：发送邮件通知（仅在文件变化时）
    - name: Send email notification
      if: steps.compare.outputs.changed == 'true'
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USER }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "✅ IPTV文件已自动更新 - $(date -u '+%Y-%m-%d %H:%M') UTC"
        to: ${{ secrets.NOTIFY_EMAIL }}
        from: GitHub Actions <actions@github.com>
        html_body: |
          <h2>📡 IPTV文件自动同步完成</h2>
          
          <div style="background-color: #f0f8ff; padding: 15px; border-radius: 5px; margin: 15px 0;">
            <p><strong>🔄 同步状态：</strong> <span style="color: green;">✅ 成功更新</span></p>
            <p><strong>📅 更新时间：</strong> $(date -u '+%Y-%m-%d %H:%M:%S UTC')</p>
            <p><strong>🔗 源文件地址：</strong> <a href="https://github.com/ioptu/IPTV.txt2m3u.player">ioptu/IPTV.txt2m3u.player</a></p>
            <p><strong>📂 你的文件：</strong> <a href="https://github.com/jia070310/lemonTV/blob/main/iptv-fe.m3u">jia070310/lemonTV/iptv-fe.m3u</a></p>
          </div>
          
          <div style="background-color: #f9f9f9; padding: 15px; border-radius: 5px; margin: 15px 0;">
            <h3>📊 文件信息</h3>
            <p><strong>新文件哈希：</strong> <code>${{ steps.download.outputs.new_hash }}</code></p>
            <p><strong>旧文件哈希：</strong> <code>${{ steps.hash_check.outputs.old_hash }}</code></p>
            <p><strong>哈希变化：</strong> <span style="color: blue;">已检测到变化</span></p>
          </div>
          
          <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #ddd;">
            <p><small>此邮件由 GitHub Actions 自动发送</small></p>
            <p><small>下次检查时间：$(date -u -d '+15 minutes' '+%Y-%m-%d %H:%M:%S UTC')</small></p>
          </div>
    
    # 步骤7：记录无变化情况
    - name: Log no changes
      if: steps.compare.outputs.changed == 'false'
      run: |
        echo "⏭️ $(date -u '+%Y-%m-%d %H:%M:%S UTC') - 文件未变化，跳过更新"
        echo "当前哈希: ${{ steps.hash_check.outputs.old_hash }}"
